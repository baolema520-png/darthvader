name: VirtualFaceCam
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: 4528JQYZKF
    CODE_SIGN_STYLE: Automatic
packages:
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    exactVersion: 1.24.2
targets:
  VirtualFaceCamCameraExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: Sources/VirtualFaceCamCameraExtension
    dependencies:
      - sdk: CoreMediaIO.framework
      - sdk: CoreMedia.framework
      - sdk: CoreVideo.framework
      - sdk: Foundation.framework
    settings:
      base:
        PRODUCT_NAME: com.virtualfacecam.app.cameraextension
        PRODUCT_BUNDLE_IDENTIFIER: com.virtualfacecam.app.cameraextension
        INFOPLIST_FILE: Sources/VirtualFaceCamCameraExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/VirtualFaceCamCameraExtension/VirtualFaceCamCameraExtension.entitlements
        ENABLE_HARDENED_RUNTIME: YES

  VirtualFaceCamDALPlugin:
    type: bundle
    platform: macOS
    sources:
      - path: Sources/VirtualFaceCamDALPlugin
        excludes: []
    dependencies:
      - sdk: CoreMediaIO.framework
      - sdk: CoreMedia.framework
      - sdk: CoreVideo.framework
      - sdk: Foundation.framework
    settings:
      base:
        PRODUCT_NAME: VirtualFaceCamDALPlugin
        PRODUCT_BUNDLE_IDENTIFIER: com.virtualfacecam.dal.plugin
        INFOPLIST_FILE: Sources/VirtualFaceCamDALPlugin/Info.plist
        WRAPPER_EXTENSION: plugin
        SKIP_INSTALL: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        OTHER_LDFLAGS:
          - -framework CoreMediaIO
          - -framework CoreMedia
          - -framework CoreVideo

  VirtualFaceCamDALPluginScaffold:
    type: framework
    platform: macOS
    sources:
      - path: Sources/VirtualFaceCamDALPluginScaffold
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.virtualfacecam.dal.scaffold
        GENERATE_INFOPLIST_FILE: YES
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  VirtualFaceCamApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/VirtualFaceCamApp
    resources:
      - path: Distribution/guide-en.html
    dependencies:
      - package: onnxruntime
      - target: VirtualFaceCamCameraExtension
        embed: true
      - target: VirtualFaceCamDALPlugin
      - target: VirtualFaceCamDALPluginScaffold
    postBuildScripts:
      - name: Embed DAL Plugin Bundle
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/PlugIns/VirtualFaceCamDALPlugin.plugin
        script: |
          set -e
          SRC="${BUILT_PRODUCTS_DIR}/VirtualFaceCamDALPlugin.plugin"
          DST="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/PlugIns/VirtualFaceCamDALPlugin.plugin"
          mkdir -p "$(dirname "$DST")"
          rm -rf "$DST"
          if [ ! -d "$SRC" ]; then
            echo "error: DAL plugin not found at $SRC" >&2
            exit 1
          fi
          ditto "$SRC" "$DST"
    settings:
      base:
        PRODUCT_NAME: 520CAM
        PRODUCT_BUNDLE_IDENTIFIER: com.virtualfacecam.app
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: 520CAM
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.video
        INFOPLIST_KEY_NSCameraUsageDescription: 520CAM necesita acceso a la camara para anonimizar tu rostro en tiempo real.
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/VirtualFaceCamApp/VirtualFaceCamApp.entitlements

  VirtualFaceCamAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/VirtualFaceCamAppTests
    dependencies:
      - target: VirtualFaceCamApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.virtualfacecam.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  VirtualFaceCamApp:
    build:
      targets:
        VirtualFaceCamCameraExtension: all
        VirtualFaceCamDALPlugin: all
        VirtualFaceCamDALPluginScaffold: all
        VirtualFaceCamApp: all
        VirtualFaceCamAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: VirtualFaceCamAppTests

  VirtualFaceCamDALPlugin:
    build:
      targets:
        VirtualFaceCamDALPlugin: all
    run:
      config: Debug
